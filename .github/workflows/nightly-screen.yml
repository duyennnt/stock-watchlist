name: nightly-screen

on:
  schedule:
    - cron: '0 2 * * 2-6'   # 02:00 UTC Tue–Sat = after US market close Mon–Fri
  workflow_dispatch: {}      # adds a manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: nightly-screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full-universe screen
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SITE_URL: 'https://duyennnt.github.io/stock-watchlist/'
        run: node scripts/nightly.mjs

      - name: Commit results
        run: |
          git config user.name "screen-bot"
          git config user.email "actions@github.com"
          git add screen-results.json
          git diff --cached --quiet || git commit -m "Nightly screen $(date -u +%F)"
          git push

      - name: Email digest
        if: ${{ env.MAIL_USERNAME != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 'Nightly stock screen digest'
          to: ${{ secrets.MAIL_TO }}
          from: Conviction Monitor
          html_body: file://email-body.html
